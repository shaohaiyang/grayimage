name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.11'
          buildozer-cmd: buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grayimage.apk
          path: ./bin/*.apk

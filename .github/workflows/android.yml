name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ env.date }}
          restore-keys: |
            ${{ runner.os }}-buildozer-global-

      - name: Cache Buildozer directory in app
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-app-${{ env.date }}
          restore-keys: |
            ${{ runner.os }}-buildozer-app-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk-${{ env.date }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libunwind-dev \
            zlib1g-dev \
            autoconf-archive
          sudo apt-get install -y \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            zlib1g-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            uuid-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good
          sudo apt-get install -y \
            zip \
            unzip \
            autoconf \
            libtool \
            automake \
            libltdl-dev \
            m4 \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            autopoint \
            gettext

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.11
          pip install kivymd pillow plyer

      - name: Verify buildozer.spec
        run: |
          echo "=== Buildozer Configuration ==="
          cat buildozer.spec
          echo ""
          echo "=== Checking Python files ==="
          ls -la *.py
          echo ""
          echo "=== Checking requirements ==="
          cat requirements.txt

      - name: Build with Buildozer
        run: |
          echo "=== Starting Buildozer Build ==="
          buildozer -v android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Check build result
        run: |
          echo "=== Checking for APK ==="
          find . -name "*.apk" -type f
          if [ -f build.log ]; then
            echo "=== Build Log (last 100 lines) ==="
            tail -100 build.log
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: grayimage-${{ env.date }}-debug
          path: |
            bin/*.apk
            bin/*.aab
          if-no-files-found: warn

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ env.date }}
          path: |
            build.log
            .buildozer/logs/
